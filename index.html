<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b;}
.wrap{max-width:1400px;margin:0 auto;padding:24px 20px;}
.header{background:#0f172a;border-radius:12px;padding:18px 22px;margin-bottom:20px;}
.live-badge{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.green-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.live-label{font-size:11px;color:#4ade80;font-weight:600;letter-spacing:1px;}
.header h1{color:#fff;font-size:22px;font-weight:700;margin-bottom:4px;}
.header p{color:#94a3b8;font-size:13px;}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;}
.kpi{background:#fff;border:0.5px solid #e2e8f0;border-radius:8px;padding:16px;}
.kpi-label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.kpi-value{font-size:28px;font-weight:700;color:#1e293b;margin-bottom:4px;}
.kpi-sub{font-size:12px;color:#94a3b8;}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.chart-card{background:#fff;border:0.5px solid #e2e8f0;border-radius:12px;padding:18px;}
.chart-title{font-size:14px;font-weight:600;color:#374151;margin-bottom:14px;}
canvas{max-height:260px;}
.legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin-bottom:10px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#475569;}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.table-card{background:#fff;border:0.5px solid #e2e8f0;border-radius:12px;padding:18px;margin-top:16px;}
.table-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.table-title{font-size:14px;font-weight:600;color:#374151;}
.badge{background:#f1f5f9;color:#475569;font-size:11px;padding:2px 8px;border-radius:9px;font-weight:600;}
.filter-tabs{display:flex;gap:4px;flex-wrap:wrap;}
.tab{padding:5px 12px;border-radius:6px;border:none;font-size:12px;cursor:pointer;background:#f1f5f9;color:#64748b;transition:all .15s;}
.tab.active{background:#0f172a;color:#fff;}
.scroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap;}
th{background:#f8fafc;color:#64748b;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;padding:8px 10px;border-bottom:1px solid #e2e8f0;text-align:left;}
td{padding:7px 10px;border-bottom:1px solid #f1f5f9;vertical-align:middle;color:#374151;}
tr:hover td{background:#fafafa;}
.right{text-align:right;}
.stage{display:inline-block;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:500;}
.s-won{background:#ecfccb;color:#365314;}
.s-lost{background:#fee2e2;color:#991b1b;}
.s-eval{background:#fef3c7;color:#92400e;}
.s-int{background:#ede9fe;color:#4c1d95;}
.s-scop{background:#d1fae5;color:#065f46;}
.s-other{background:#f1f5f9;color:#475569;}
.ch-google{background:#E6F1FB;color:#0C447C;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:500;}
.ch-facebook{background:#EEEDFE;color:#3C3489;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:500;}
.ch-linkedin{background:#E1F5EE;color:#085041;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:500;}
.mov-val{color:#1D9E75;font-weight:600;}
.mov-null{color:#94a3b8;}
.mono{font-family:'SF Mono',monospace;font-size:11px;color:#64748b;}
.footer{text-align:center;font-size:11px;color:#94a3b8;margin-top:20px;padding-bottom:12px;}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr);}
.charts-row{grid-template-columns:1fr;}}
</style>
</head>

let activeChannel='All';
function stageBadge(ds){
  if(!ds)return'<span style="color:#94a3b8">—</span>';
  const d=ds.toLowerCase();
  if(d.includes('closed won'))return`<span class="stage s-won">${ds}</span>`;
  if(d.includes('closed lost'))return`<span class="stage s-lost">${ds}</span>`;
  if(d.includes('evaluation'))return`<span class="stage s-eval">${ds}</span>`;
  if(d.includes('interest'))return`<span class="stage s-int">${ds}</span>`;
  if(d.includes('scoping'))return`<span class="stage s-scop">${ds}</span>`;
  return`<span class="stage s-other">${ds}</span>`;
}
function movCell(val){
  if(val===null||val===undefined)return'<span class="mov-null">—</span>';
  return`<span class="mov-val">${Number(val).toLocaleString()}</span>`;
}
function renderTable(){
  const filtered=activeChannel==='All'?CONTACTS:CONTACTS.filter(c=>c[11]===activeChannel);
  document.getElementById('rowCount').textContent=filtered.length+' records';
  document.getElementById('tableBody').innerHTML=filtered.map(c=>`<tr>
    <td>${c[0]||'—'}</td>
    <td>${c[1]||'—'}</td>
    <td>${c[2]||'—'}</td>
    <td>${stageBadge(c[3])}</td>
    <td>${c[4]||'—'}</td>
    <td class="right">${c[5]!==null?Number(c[5]).toLocaleString():'—'}</td>
    <td class="right">${movCell(c[6])}</td>
    <td class="mono">${c[7]||'—'}</td>
    <td class="mono">${c[8]||'—'}</td>
    <td class="mono">${c[9]||'—'}</td>
    <td>${c[10]||'—'}</td>
  </tr>`).join('');
}
function filterChannel(ch){
  activeChannel=ch;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.textContent===ch));
  renderTable();
}
