<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b;padding:24px}
.header{background:#0f172a;border-radius:12px;padding:18px 22px;margin-bottom:24px}
.live-badge{display:inline-flex;align-items:center;gap:6px;background:#0f2a1a;border:1px solid #166534;border-radius:20px;padding:3px 10px;margin-bottom:10px}
.green-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.live-text{font-size:11px;font-weight:600;color:#22c55e;letter-spacing:.5px}
.header h1{color:#fff;font-size:22px;font-weight:700;margin-bottom:4px}
.header .subtitle{color:#94a3b8;font-size:13px}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.kpi-card{background:#fff;border:0.5px solid #e2e8f0;border-radius:8px;padding:16px}
.kpi-label{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kpi-value{font-size:28px;font-weight:700;color:#0f172a;line-height:1}
.kpi-sub{font-size:12px;color:#94a3b8;margin-top:4px}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.chart-card{background:#fff;border:0.5px solid #e2e8f0;border-radius:12px;padding:20px}
.chart-title{font-size:13px;font-weight:700;color:#0f172a;margin-bottom:12px}
.custom-legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#475569}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.table-card{background:#fff;border:0.5px solid #e2e8f0;border-radius:12px;padding:20px;margin-bottom:24px}
.table-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.table-title{font-size:13px;font-weight:700;color:#0f172a}
.badge-count{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600;color:#64748b}
.filter-tabs{display:flex;gap:6px;margin-bottom:14px}
.tab{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #e2e8f0;background:#fff;color:#64748b;transition:all .15s}
.tab.active{background:#0f172a;color:#fff;border-color:#0f172a}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f8fafc;padding:8px 10px;text-align:left;font-weight:600;color:#64748b;font-size:11px;white-space:nowrap;border-bottom:1px solid #e2e8f0}
td{padding:8px 10px;border-bottom:1px solid #f1f5f9;white-space:nowrap;vertical-align:middle}
tr:hover td{background:#f8fafc}
.stage-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.stage-cw{background:#dcfce7;color:#166534}
.stage-cl{background:#fee2e2;color:#991b1b}
.stage-ev{background:#fef3c7;color:#92400e}
.stage-in{background:#ede9fe;color:#4c1d95}
.stage-sc{background:#d1fae5;color:#065f46}
.ch-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.ch-google{background:#E6F1FB;color:#0C447C}
.ch-facebook{background:#EEEDFE;color:#3C3489}
.ch-linkedin{background:#E1F5EE;color:#085041}
.ch-unknown{background:#f1f5f9;color:#64748b}
.mov-val{color:#0d9488;font-weight:700}
.mov-null{color:#94a3b8}
.mono{font-family:'SF Mono',Monaco,monospace;font-size:11px}
.footer{text-align:center;font-size:11px;color:#94a3b8;padding:12px}
.tr-right{text-align:right}
</style>
</head>

let activeChannel = 'All';
function fmtK(v){return v===null||v===undefined?'':Math.round(v/1000)+'K'}
function dash(){return '<span style="color:#94a3b8">—</span>'}
function stageBadge(ds){
  if(!ds)return dash();
  let cls='stage-badge ';
  if(ds.includes('Closed Won'))cls+='stage-cw';
  else if(ds.includes('Closed Lost'))cls+='stage-cl';
  else if(ds.includes('Evaluation'))cls+='stage-ev';
  else if(ds.includes('Interest'))cls+='stage-in';
  else if(ds.includes('Scoping'))cls+='stage-sc';
  return `<span class="${cls}">${ds}</span>`;
}
function chBadge(c){
  if(!c||c==='Unknown')return dash();
  return `<span class="ch-badge ch-${c.toLowerCase()}">${c}</span>`;
}
function renderTable(){
  const rows=activeChannel==='All'?ALL_DATA:ALL_DATA.filter(r=>r.ch===activeChannel);
  document.getElementById('record-count').textContent=rows.length+' records';
  document.getElementById('table-body').innerHTML=rows.map(r=>`
    <tr>
      <td>${r.co||dash()}</td>
      <td>${r.dn||dash()}</td>
      <td>${r.mo||dash()}</td>
      <td>${stageBadge(r.ds)}</td>
      <td>${r.l3||dash()}</td>
      <td class="tr-right">${r.fm!==null&&r.fm!==undefined?fmtK(r.fm):dash()}</td>
      <td class="tr-right">${r.am!==null&&r.am!==undefined?`<span class="mov-val">${Math.round(r.am).toLocaleString()}</span>`:dash()}</td>
      <td class="mono">${r.aa||dash()}</td>
      <td class="mono">${r.ac||dash()}</td>
      <td class="mono">${r.ai||dash()}</td>
      <td>${r.em||dash()}</td>
      <td>${chBadge(r.ch)}</td>
    </tr>`).join('');
}
function filterChannel(c){
  activeChannel=c;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.textContent===c));
  renderTable();
}
