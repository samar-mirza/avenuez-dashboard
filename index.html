<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1e293b;padding:20px}
.header{background:#0f172a;border-radius:12px;padding:18px 22px;margin-bottom:20px;color:#fff}
.live{display:flex;align-items:center;gap:8px;font-size:11px;color:#94a3b8;margin-bottom:8px}
.dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.header h1{font-size:20px;font-weight:700;margin-bottom:4px}
.header p{font-size:13px;color:#94a3b8}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.kpi{background:#fff;border:0.5px solid #e2e8f0;border-radius:8px;padding:16px}
.kpi .label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kpi .value{font-size:26px;font-weight:700;color:#0f172a;line-height:1}
.kpi .sub{font-size:11px;color:#94a3b8;margin-top:4px}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.card{background:#fff;border:0.5px solid #e2e8f0;border-radius:12px;padding:18px}
.card h3{font-size:13px;font-weight:600;color:#374151;margin-bottom:12px}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#64748b}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
canvas{max-height:220px}
.table-card{background:#fff;border:0.5px solid #e2e8f0;border-radius:12px;padding:18px;margin-top:16px}
.table-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.table-header h3{font-size:14px;font-weight:600}
.badge{background:#f1f5f9;border-radius:20px;padding:3px 10px;font-size:12px;color:#64748b}
.tabs{display:flex;gap:6px;margin-bottom:12px}
.tab{padding:5px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid #e2e8f0;background:#fff;color:#64748b}
.tab.active{background:#0f172a;color:#fff;border-color:#0f172a}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f8fafc;padding:8px 10px;text-align:left;font-weight:600;color:#475569;border-bottom:1px solid #e2e8f0;white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid #f1f5f9;vertical-align:top}
tr:hover td{background:#f8fafc}
.ds-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.ch-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.mono{font-family:monospace;font-size:11px}
.teal-bold{color:#1D9E75;font-weight:600}
.grey-dash{color:#94a3b8}
.footer{text-align:center;font-size:11px;color:#94a3b8;margin-top:20px;padding:10px}
</style>
</head>
